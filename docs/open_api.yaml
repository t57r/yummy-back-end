openapi: 3.0.3
info:
  title: Yummy API
  version: 0.2.0
  description: |
    Yummy backend API (Go + Fiber).
    Includes auth, recipes, categories, and favorites.

servers:
  - url: http://localhost:8081
  - url: http://localhost:8080

security: []

tags:
  - name: Auth
  - name: Categories
  - name: Recipes
  - name: Users
  - name: Favorites
  - name: Assets

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string

    User:
      type: object
      required: [id, name, email, created_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    Recipe:
      type: object
      required:
        - id
        - title
        - prep_time_minutes
        - cook_time_minutes
        - serves
        - ingredients
        - preparation
        - tags
      properties:
        id:
          type: integer
          format: int64
          description: Recipe ID
        title:
          type: string
        image:
          type: string
          nullable: true
          description: Relative static image path.
          example: /img/1956720-556x370.jpg
        summary:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
          format: uri
        prep_time_minutes:
          type: integer
          format: int32
          nullable: true
        cook_time_minutes:
          type: integer
          format: int32
          nullable: true
        serves:
          type: integer
          format: int32
          nullable: true
        ingredients:
          type: array
          items:
            type: string
        preparation:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    RecipeResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Recipe"

    PaginationKeyset:
      type: object
      required: [limit, last_id, has_next, total]
      properties:
        limit:
          type: integer
          format: int32
          example: 20
        last_id:
          type: integer
          format: int64
          description: Input cursor from request.
          example: 0
        next_last_id:
          type: integer
          format: int64
          description: Use as `last_id` for the next page when `has_next` is true.
          example: 1956720
        has_next:
          type: boolean
          example: true
        total:
          type: integer
          format: int64
          example: 4482

    PaginationOffset:
      type: object
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
          format: int32
          example: 20
        offset:
          type: integer
          format: int32
          example: 0
        total:
          type: integer
          format: int64
          example: 10

    ListRecipesResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Recipe"
        pagination:
          $ref: "#/components/schemas/PaginationKeyset"

    ListFavoritesResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Recipe"
        pagination:
          $ref: "#/components/schemas/PaginationOffset"

    AuthTokens:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int32
          example: 900

    SignUpRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Bob
        email:
          type: string
          format: email
          example: bob@example.com
        password:
          type: string
          format: password
          minLength: 8

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    SignUpResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    SignInResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    RefreshTokenResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignUpResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/signin:
    post:
      tags: [Auth]
      summary: Sign in and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      tags: [Categories]
      summary: List categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes:
    get:
      tags: [Recipes]
      summary: List recipes
      description: |
        Keyset pagination by recipe ID.
        Use `last_id` from the previous response `pagination.next_last_id`.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search by recipe title.
        - in: query
          name: category
          schema:
            type: string
          description: Category name.
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: last_id
          schema:
            type: integer
            format: int64
            default: 0
            minimum: 0
          description: Return records with `id > last_id`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipesResponse"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{recipeId}:
    get:
      tags: [Recipes]
      summary: Get recipe by ID
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeResponse"
        "400":
          description: Invalid recipe ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/favorites:
    get:
      tags: [Favorites]
      summary: List current user's favorite recipes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFavoritesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/favorites/{recipeId}:
    post:
      tags: [Favorites]
      summary: Add a recipe to favorites
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Added
        "400":
          description: Invalid recipe ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Favorites]
      summary: Remove a recipe from favorites
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Removed
        "400":
          description: Invalid recipe ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /img/{fileName}:
    get:
      tags: [Assets]
      summary: Get recipe image file
      description: Serves static image files from the `img/` folder.
      parameters:
        - in: path
          name: fileName
          required: true
          schema:
            type: string
          example: 1956720-556x370.jpg
      responses:
        "200":
          description: Image content
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
